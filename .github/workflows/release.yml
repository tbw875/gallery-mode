name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - run: npm run icons
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run package

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            web-ext-artifacts/gallery-mode-chrome.zip
            web-ext-artifacts/gallery-mode-firefox.xpi
          generate_release_notes: true

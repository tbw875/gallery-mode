<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gallery Mode</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0d0b;
        --panel: #16130f;
        --panel-raised: #1d1812;
        --border: #2a2318;
        --border-strong: #3a3020;
        --ink: #f4ede1;
        --ink-dim: #a89f90;
        --ink-faint: #6e6557;
        --accent: #c9a961;
        --accent-dim: #8f7840;
      }
      * { box-sizing: border-box; }
      html, body { background: var(--bg); color: var(--ink); }
      body {
        margin: 0;
        width: 300px;
        padding: 20px 22px 22px;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      header {
        padding-bottom: 14px;
        margin-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .eyebrow {
        display: block;
        font-size: 9px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 4px;
      }
      h1 {
        margin: 0;
        font-family: "Didot", "Bodoni 72", Georgia, serif;
        font-weight: 400;
        font-size: 22px;
        letter-spacing: -0.005em;
        color: var(--ink);
      }
      .enable {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 16px;
        cursor: pointer;
        transition: border-color 150ms ease;
      }
      .enable:hover { border-color: var(--border-strong); }
      .enable strong { font-weight: 500; color: var(--ink); }
      input[type="checkbox"].switch {
        appearance: none;
        width: 34px; height: 18px;
        border-radius: 999px;
        background: var(--border-strong);
        position: relative;
        cursor: pointer;
        transition: background 150ms ease;
        flex-shrink: 0;
        margin: 0;
      }
      input[type="checkbox"].switch::after {
        content: "";
        position: absolute;
        top: 2px; left: 2px;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--ink-dim);
        transition: transform 150ms ease, background 150ms ease;
      }
      input[type="checkbox"].switch:checked { background: var(--accent-dim); }
      input[type="checkbox"].switch:checked::after {
        transform: translateX(16px);
        background: var(--accent);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--ink-faint);
        font-weight: 500;
      }
      .source {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--ink-dim);
        transition: background 120ms ease, color 120ms ease;
      }
      .source:hover { background: var(--panel); color: var(--ink); }
      .source input {
        appearance: none;
        width: 14px; height: 14px;
        border: 1px solid var(--border-strong);
        border-radius: 3px;
        cursor: pointer;
        position: relative;
        transition: all 120ms ease;
        flex-shrink: 0;
        margin: 0;
      }
      .source input:checked { background: var(--accent); border-color: var(--accent); }
      .source input:checked::after {
        content: "";
        position: absolute;
        top: 1px; left: 4px;
        width: 4px; height: 8px;
        border: solid var(--bg);
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }
      button.ghost {
        margin-top: 16px;
        width: 100%;
        padding: 10px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--ink-dim);
        border-radius: 6px;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 150ms ease;
      }
      button.ghost:hover { border-color: var(--accent-dim); color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <span class="eyebrow">Now showing</span>
      <h1>Gallery Mode</h1>
    </header>

    <label class="enable">
      <span><strong>Replace ads</strong></span>
      <input type="checkbox" class="switch" id="enabled" />
    </label>

    <section>
      <h2>Collections</h2>
      <label class="source">
        <input type="checkbox" data-source="artic" />
        <span>Art Institute of Chicago</span>
      </label>
      <label class="source">
        <input type="checkbox" data-source="met" />
        <span>The Metropolitan Museum</span>
      </label>
      <label class="source">
        <input type="checkbox" data-source="cleveland" />
        <span>Cleveland Museum of Art</span>
      </label>
    </section>

    <button id="options-link" class="ghost" type="button">More settings</button>
    <script type="module" src="popup.js"></script>
  </body>
</html>
